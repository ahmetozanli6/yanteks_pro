<html lang="tr">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0b0f1a;--surface:#141926;--surface2:#1a2035;--surface3:#212841;--surface4:#273050;
--text:#e8ecf4;--text2:#94a3b8;--text3:#64748b;
--accent:#6366f1;--accent2:#818cf8;--accent-soft:rgba(99,102,241,.12);--accent-glow:rgba(99,102,241,.25);
--green:#34d399;--green-soft:rgba(52,211,153,.1);--green-glow:rgba(52,211,153,.2);
--amber:#fbbf24;--amber-soft:rgba(251,191,36,.1);
--red:#f87171;--red-soft:rgba(248,113,113,.1);
--purple:#a78bfa;--purple-soft:rgba(167,139,250,.1);
--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.11);
--shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.55);
--r:12px;--r2:16px;--r3:20px;
--t:.2s cubic-bezier(.4,0,.2,1);--t2:.35s cubic-bezier(.32,.72,0,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;outline:none}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);padding-bottom:calc(56px + env(safe-area-inset-bottom));font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;background-image:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.08) 0%,transparent 60%)}
.topbar{position:sticky;top:0;z-index:100;background:rgba(11,15,26,.82);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border);padding:calc(14px + env(safe-area-inset-top)) 20px 14px;display:flex;justify-content:space-between;align-items:center}
.topbar-brand{display:flex;align-items:center;gap:11px}
.topbar-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;box-shadow:0 2px 12px var(--accent-glow)}
.topbar-title{font-size:14px;font-weight:800;color:var(--text);letter-spacing:.06em;text-transform:uppercase}.topbar-title span{background:linear-gradient(135deg,var(--accent2),#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-actions{display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:var(--t)}
.sync-dot.ok{background:var(--green);box-shadow:0 0 8px var(--green-glow)}.sync-dot.busy{background:var(--amber);animation:pulse 1.2s infinite}.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chip{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--surface);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;transition:var(--t);font-family:inherit;white-space:nowrap;letter-spacing:.02em}
.chip:hover{border-color:var(--accent);color:var(--text);background:var(--accent-soft)}.chip:active{transform:scale(.96)}
.chip.primary{background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--accent-glow)}.chip.primary:hover{box-shadow:0 4px 20px var(--accent-glow)}
.chip.grn{background:var(--green-soft);color:var(--green);border-color:rgba(52,211,153,.2)}.chip.grn:hover{background:rgba(52,211,153,.18)}
.chip.wrn{background:var(--amber-soft);color:var(--amber);border-color:rgba(251,191,36,.2)}.chip.wrn:hover{background:rgba(251,191,36,.18)}
.chip.ppl{background:var(--purple-soft);color:var(--purple);border-color:rgba(167,139,250,.2)}.chip.ppl:hover{background:rgba(167,139,250,.18)}
.stats-sec{padding:16px 20px 6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.stat-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;background:var(--surface);border:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text2)}
.stat-pill .v{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--accent2)}
.stat-pill .vs{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--green)}
.stat-pill .vw{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--amber)}
.toolbar{padding:6px 20px 10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.search-sec{padding:4px 20px 14px;display:flex;gap:8px}
.search-box{flex:1;position:relative}
.search-box input{width:100%;padding:11px 14px 11px 40px;border-radius:var(--r);border:1px solid var(--border);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);transition:var(--t)}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}.search-box input::placeholder{color:var(--text3)}
.search-box .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);color:var(--text3);font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center}.s-clr.on{display:flex}
.col-btn{padding:11px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:inherit;transition:var(--t);white-space:nowrap}
.col-btn:hover{border-color:var(--accent);color:var(--text)}.col-btn:active{transform:scale(.96)}
.list{padding:0 12px 12px}
.cat{margin-top:12px;border-radius:var(--r2);overflow:hidden;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);animation:fadeUp .4s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.cat-head{padding:13px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;transition:background var(--t);background:var(--surface2)}
.cat-head:hover{background:var(--surface3)}
.cat-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.cat-chev{font-size:10px;color:var(--text3);transition:transform .25s}.cat.closed .cat-chev{transform:rotate(-90deg)}
.cat-name{font-size:13px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.cat-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;font-family:'JetBrains Mono',monospace}
.cat-actions{display:flex;gap:2px}
.cb{width:28px;height:28px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:var(--t);opacity:.5}
.cb:hover{opacity:1;background:rgba(255,255,255,.06)}.cb.dng:hover{background:var(--red-soft);color:var(--red)}.cb.acc:hover{background:var(--accent-soft);color:var(--accent2)}.cb.ppl:hover{background:var(--purple-soft);color:var(--purple)}
@media(hover:none){.cb{opacity:.8}}
.cat-body{border-top:1px solid var(--border)}.cat.closed .cat-body{display:none}
.item{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:20px 1.4fr .65fr 1fr 1fr 1fr 76px;align-items:center;gap:8px;transition:background var(--t)}
.item:last-child{border-bottom:none}.item:hover{background:rgba(255,255,255,.02)}
.item-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--accent);flex-shrink:0}
.item-name{font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em;color:var(--text)}
.denye-tag{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;background:var(--accent-soft);color:var(--accent2);border:1px solid rgba(99,102,241,.2)}
.denye-tag.empty{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.price-val{font-weight:800;font-size:11px;text-align:right;cursor:pointer;transition:var(--t);padding:5px 8px;border-radius:8px;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:flex-end;min-height:34px;justify-content:center}
.price-val:hover{background:rgba(255,255,255,.04)}
.price-val.cash{color:var(--green)}.price-val.v90{color:var(--purple)}.price-val.v180{color:var(--accent2)}
.price-val.empty{color:var(--text3);font-weight:600}
.price-val .ptime{font-size:7px;color:var(--text3);font-weight:400;margin-top:2px;font-family:'Plus Jakarta Sans',sans-serif}
.item-acts{display:flex;gap:2px;justify-content:flex-end}
.ib{width:26px;height:26px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:var(--t)}
.ib:hover{background:var(--accent-soft);color:var(--accent2)}.ib.dng:hover{background:var(--red-soft);color:var(--red)}.ib.hist:hover{background:var(--purple-soft);color:var(--purple)}
.fast-in{width:100%;padding:4px 8px;border:2px solid var(--accent);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:800;text-align:right;background:var(--surface3);color:var(--text)}
.fast-in:focus{box-shadow:0 0 0 3px var(--accent-soft)}
.empty-s{text-align:center;padding:60px 20px;color:var(--text3)}.empty-s .ei{font-size:48px;opacity:.2;margin-bottom:14px}.empty-s h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px}.empty-s p{font-size:12px;max-width:260px;margin:0 auto}
.skel{padding:16px}.sk{height:52px;border-radius:var(--r);background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:10px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}.overlay.on{opacity:1;pointer-events:auto}
.drawer{position:fixed;bottom:0;left:0;width:100%;background:var(--surface);border-radius:24px 24px 0 0;padding:22px 24px 36px;transform:translateY(100%);transition:transform var(--t2);z-index:201;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);border-top:1px solid var(--border2)}
.drawer.on{transform:translateY(0)}
.dw-bar{width:40px;height:4px;background:var(--surface3);border-radius:2px;margin:-6px auto 18px}
.drawer h2{font-size:18px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:14px}.field label{display:block;font-size:10px;font-weight:800;color:var(--text3);margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface2);font-family:inherit;font-size:14px;color:var(--text);transition:var(--t)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);background:var(--surface3);box-shadow:0 0 0 3px var(--accent-soft)}
.field select option{background:var(--surface2)}
.field .err{font-size:10px;color:var(--red);margin-top:3px;display:none}.field.bad input{border-color:var(--red);background:var(--red-soft)}.field.bad .err{display:block}
.auto-p{background:var(--surface2);padding:12px 16px;border-radius:var(--r);border:1px solid var(--border);font-size:12px;font-weight:700;display:flex;justify-content:space-around;margin-bottom:14px;gap:8px}
.auto-p .pp{display:flex;flex-direction:column;align-items:center;gap:3px}
.auto-p .pl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.auto-p .pv{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:14px}
.auto-p .p9{color:var(--purple)}.auto-p .p18{color:var(--accent2)}
.btn-r{display:flex;gap:8px;margin-top:20px}
.btn{flex:1;padding:14px;border-radius:var(--r);font-weight:800;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:var(--t);letter-spacing:.02em}
.btn.pri{background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}.btn.pri:hover{box-shadow:0 4px 20px var(--accent-glow)}.btn.pri:disabled{opacity:.4;cursor:not-allowed}
.btn.gho{background:var(--surface2);color:var(--text);border:1px solid var(--border2)}.btn.gho:hover{background:var(--surface3)}
.btn.grn{background:linear-gradient(135deg,var(--green),#10b981);color:#0b0f1a}.btn.grn:hover{box-shadow:0 4px 16px var(--green-glow)}
.btn.amb{background:linear-gradient(135deg,var(--amber),#f59e0b);color:#0b0f1a}
.modal{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}.modal.on{display:flex}
.m-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);max-width:420px;width:100%;padding:26px;box-shadow:var(--shadow-lg);animation:pop .25s}
@keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.m-card h3{font-size:17px;font-weight:900;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.m-card p{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.mi{width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;font-size:17px}.mi.dng{background:var(--red-soft)}.mi.wrn{background:var(--amber-soft)}.mi.ppl{background:var(--purple-soft)}
.toasts{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 20px;border-radius:var(--r);font-size:12px;font-weight:700;box-shadow:var(--shadow);animation:tIn .3s;pointer-events:auto;max-width:90vw;display:flex;align-items:center;gap:6px;backdrop-filter:blur(12px);letter-spacing:.02em}
.toast.ok{background:rgba(52,211,153,.92);color:#0b0f1a}.toast.bad{background:rgba(248,113,113,.92);color:#0b0f1a}.toast.wrn{background:rgba(251,191,36,.92);color:#0b0f1a}.toast.info{background:rgba(99,102,241,.92);color:#fff}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}}@keyframes tOut{to{opacity:0;transform:translateY(10px)}}

/* ===== FİYAT GEÇMİŞİ MODALI ===== */
#mod-hist .m-card{max-width:520px;max-height:80vh;overflow-y:auto}
.hist-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.hist-name{font-size:15px;font-weight:900;color:var(--text)}
.hist-denye{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent2);margin-top:2px}
.chart-wrap{background:var(--surface2);border-radius:var(--r);padding:14px;border:1px solid var(--border);margin-bottom:14px;position:relative;height:180px}
.hist-list{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);gap:8px}
.hist-row.latest{border-color:rgba(99,102,241,.3);background:var(--accent-soft)}
.hist-date{font-size:11px;color:var(--text3);flex-shrink:0}
.hist-price{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;color:var(--green)}
.hist-diff{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.hist-diff.up{background:rgba(52,211,153,.15);color:var(--green)}
.hist-diff.dn{background:rgba(248,113,113,.15);color:var(--red)}
.hist-diff.eq{background:var(--surface3);color:var(--text3)}
.hist-empty{text-align:center;padding:30px;color:var(--text3);font-size:12px}

/* ===== TOPLU GÜNCELLEME DRAWERI ===== */
#dw-bulk .drawer{max-height:95vh}
.bulk-preview{background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.bulk-preview-head{padding:10px 14px;background:var(--surface3);font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;display:flex;justify-content:space-between}
.bulk-preview-list{max-height:200px;overflow-y:auto}
.bulk-prev-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:8px;font-size:12px}
.bulk-prev-row:last-child{border-bottom:none}
.bulk-prev-name{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);flex:1}
.bulk-prev-old{font-family:'JetBrains Mono',monospace;color:var(--text3);text-decoration:line-through;font-size:11px;white-space:nowrap}
.bulk-prev-arrow{color:var(--text3);font-size:10px}
.bulk-prev-new{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:11px;white-space:nowrap}
.bulk-prev-new.up{color:var(--green)}.bulk-prev-new.dn{color:var(--red)}
.type-tabs{display:flex;gap:6px;margin-bottom:14px}
.type-tab{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:var(--t);font-family:inherit;color:var(--text2)}
.type-tab.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent2)}
.seg-tabs{display:flex;gap:6px;margin-bottom:14px}
.seg-tab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:var(--t);font-family:inherit;color:var(--text2)}
.seg-tab.on{background:var(--green-soft);border-color:rgba(52,211,153,.3);color:var(--green)}
.seg-tab.on.dn{background:var(--red-soft);border-color:rgba(248,113,113,.3);color:var(--red)}
.bulk-stat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.bs-pill{flex:1;min-width:80px;padding:10px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);text-align:center}
.bs-val{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:16px;color:var(--accent2)}
.bs-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

@media(max-width:700px){.item{grid-template-columns:20px 1.2fr .6fr 1fr 68px}.item .price-val.v90,.item .price-val.v180{display:none}}
@media(max-width:480px){.topbar{padding:10px 14px}.list{padding:0 8px 8px}.item{grid-template-columns:18px 1fr .5fr 1fr 60px;gap:5px;padding:8px 10px}.item-name{font-size:11px}.denye-tag{font-size:9px;padding:2px 6px}.price-val{font-size:10px;padding:3px 5px}.ib{width:22px;height:22px;font-size:11px}.stats-sec,.toolbar{padding-left:14px;padding-right:14px}.search-sec{padding-left:14px;padding-right:14px}}
*{-webkit-overflow-scrolling:touch}
a,button{-webkit-tap-highlight-color:transparent}
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(56px + env(safe-area-inset-bottom));background:rgba(11,15,26,.96);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:flex-start;z-index:200;padding-bottom:env(safe-area-inset-bottom);}
.bnav-item{flex:1;height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;text-decoration:none;color:rgba(255,255,255,.35);font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;-webkit-tap-highlight-color:transparent;cursor:pointer;border:none;background:none;font-family:inherit;padding:0;}
.bnav-item.on{color:#818cf8;}

<script>
const S_URL="https://zmlbdpjcergcvcurihuy.supabase.co";
const S_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptbGJkcGpjZXJnY3ZjdXJpaHV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTA2MzIsImV4cCI6MjA5MTA4NjYzMn0.Jh4e_UXSL7CH7EzLBhhXtQYM0-iQwrFU3GHnoe-njBM";
const db=supabase.createClient(S_URL,S_KEY);
let P=[],closed=new Set(),allCl=false,selIds=new Set(),cfCb=null;
let histChart=null;
let bulkType='pct',bulkDir='up';

const esc=s=>s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
const trl=s=>(s||'').toString().replaceAll('İ','i').replaceAll('I','ı').toLowerCase();
const isHdr=p=>!p.denye&&!p.bolum_adi;
function dot(s){const e=document.getElementById('sd');e.classList.remove('ok','busy','err');if(s)e.classList.add(s);}
function toast(m,t='info'){const c=document.getElementById('toasts'),el=document.createElement('div');el.className='toast '+t;const icons={ok:'✓',bad:'✕',wrn:'⚠',info:'·'};el.innerHTML='<span>'+icons[t]+'</span><span>'+m+'</span>';c.appendChild(el);setTimeout(()=>{el.style.animation='tOut .25s forwards';setTimeout(()=>el.remove(),250)},2800);}

// ============================================================
// FİYAT GEÇMİŞİ — Supabase tablosu: fiyat_gecmisi
// id, urun_id, urun_adi, eski_fiyat, yeni_fiyat, degisim_tarihi
// Bu tabloyu ilk kullanımda otomatik migrate etmeye çalışırız,
// yoksa localStorage'da da saklarız (fallback).
// ============================================================
const HIST_KEY='yx_fiyat_hist';
function loadLocalHist(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch{return [];}}
function saveLocalHist(h){try{localStorage.setItem(HIST_KEY,JSON.stringify(h));}catch{}}

async function pushHistory(urunId,urunAdi,eskiFiyat,yeniFiyat){
  if(eskiFiyat===yeniFiyat||(!eskiFiyat&&!yeniFiyat))return;
  const rec={urun_id:urunId,urun_adi:urunAdi,eski_fiyat:parseFloat(eskiFiyat)||0,yeni_fiyat:parseFloat(yeniFiyat)||0,degisim_tarihi:new Date().toISOString()};
  // Supabase'e kaydet
  try{await db.from('fiyat_gecmisi').insert([rec]);}catch(e){}
  // Yerel yedek
  const loc=loadLocalHist();
  loc.push(rec);
  if(loc.length>1000)loc.splice(0,loc.length-1000);
  saveLocalHist(loc);
}

async function getHistory(urunId){
  let rows=[];
  try{
    const{data}=await db.from('fiyat_gecmisi').select('*').eq('urun_id',urunId).order('degisim_tarihi',{ascending:true}).limit(50);
    if(data&&data.length)rows=data;
  }catch(e){}
  if(!rows.length){
    rows=loadLocalHist().filter(x=>String(x.urun_id)===String(urunId)).sort((a,b)=>new Date(a.degisim_tarihi)-new Date(b.degisim_tarihi));
  }
  return rows;
}

async function openHistory(id){
  const it=P.find(x=>String(x.id)===String(id));
  if(!it)return;
  document.getElementById('hist-item-name').textContent=it.urun_kodu||'İsimsiz';
  document.getElementById('hist-item-denye').textContent=it.denye?'Denye: '+it.denye:'';
  document.getElementById('hist-list').innerHTML='<div class="hist-empty">Yükleniyor...</div>';
  document.getElementById('mod-hist').classList.add('on');
  if(histChart){histChart.destroy();histChart=null;}

  const rows=await getHistory(id);
  // Güncel fiyatı da ekle (geçmişin sonuna)
  const allPts=[...rows];
  if(it.pesin_fiyat){
    // Son kayıt zaten aynı fiyatsa tekrar ekleme
    const last=allPts[allPts.length-1];
    if(!last||last.yeni_fiyat!==it.pesin_fiyat){
      allPts.push({urun_id:id,yeni_fiyat:it.pesin_fiyat,degisim_tarihi:it.updated_at||new Date().toISOString(),_current:true});
    }
  }

  if(!allPts.length){
    document.getElementById('hist-list').innerHTML='<div class="hist-empty">Bu ürün için henüz fiyat geçmişi yok.<br>Fiyat değiştirildikçe otomatik kaydedilecek.</div>';
    return;
  }

  // Grafik
  const labels=allPts.map(r=>{const d=new Date(r.degisim_tarihi);return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit'});});
  const vals=allPts.map(r=>r.yeni_fiyat);
  const ctx=document.getElementById('hist-chart').getContext('2d');
  histChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{label:'Peşin ($)',data:vals,borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.12)',borderWidth:2,pointBackgroundColor:'#34d399',pointRadius:4,pointHoverRadius:6,fill:true,tension:.35}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.parsed.y.toFixed(2)}}},scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9}}},y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#64748b',font:{size:9},callback:v=>'$'+v.toFixed(2)}}}}
  });

  // Liste
  let listH='';
  const rev=[...allPts].reverse();
  rev.forEach((r,i)=>{
    const d=new Date(r.degisim_tarihi);
    const dateStr=d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'2-digit'})+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
    const diff=i<rev.length-1?r.yeni_fiyat-(rev[i+1].yeni_fiyat||0):0;
    let diffHtml='';
    if(i<rev.length-1){const cls=diff>0?'up':diff<0?'dn':'eq';const sym=diff>0?'▲':diff<0?'▼':'→';diffHtml='<span class="hist-diff '+cls+'">'+sym+(Math.abs(diff)).toFixed(2)+'</span>';}
    listH+='<div class="hist-row'+(i===0?' latest':'')+'"><span class="hist-date">'+dateStr+(r._current?' <span style="font-size:9px;color:var(--accent2)">(Güncel)</span>':'')+'</span>'+diffHtml+'<span class="hist-price">$'+r.yeni_fiyat.toFixed(2)+'</span></div>';
  });
  document.getElementById('hist-list').innerHTML=listH;
}

// ============================================================
// TOPLU FİYAT GÜNCELLEME
// ============================================================
function openBulkDw(){
  // Bölüm seçini doldur
  const sel=document.getElementById('bulk-bolum');
  sel.innerHTML='<option value="">Tüm ürünler</option>'+P.filter(x=>isHdr(x)).map(x=>'<option value="'+esc(x.urun_kodu)+'">'+esc(x.urun_kodu)+'</option>').join('');
  document.getElementById('bulk-val').value='';
  updateBulkPreview();
  document.getElementById('ov-bulk').classList.add('on');
  document.getElementById('dw-bulk').classList.add('on');
  setTimeout(()=>document.getElementById('bulk-val').focus(),300);
}
function closeBulkDw(){
  document.getElementById('ov-bulk').classList.remove('on');
  document.getElementById('dw-bulk').classList.remove('on');
}
function setBulkType(t){
  bulkType=t;
  document.querySelectorAll('.type-tab').forEach(b=>b.classList.toggle('on',b.dataset.type===t));
  document.getElementById('bulk-val-lbl').textContent=t==='pct'?'Yüzde (%)':'Sabit Miktar ($)';
  document.getElementById('bulk-val').placeholder=t==='pct'?'Örn: 5':'Örn: 0.50';
  updateBulkPreview();
}
function setBulkDir(d){
  bulkDir=d;
  document.querySelectorAll('.seg-tab').forEach(b=>{b.classList.toggle('on',b.dataset.dir===d);if(b.dataset.dir===d)b.classList.toggle('dn',d==='dn');else b.classList.remove('dn');});
  updateBulkPreview();
}
function onBulumChange(){updateBulkPreview();}

function getBulkItems(){
  const bolum=document.getElementById('bulk-bolum').value;
  return P.filter(p=>!isHdr(p)&&p.pesin_fiyat>0&&(!bolum||p.bolum_adi===bolum));
}
function calcNew(cur,val){
  if(!val||isNaN(val))return cur;
  if(bulkType==='pct'){
    const delta=cur*(val/100);
    return bulkDir==='up'?cur+delta:Math.max(0,cur-delta);
  }else{
    return bulkDir==='up'?cur+val:Math.max(0,cur-val);
  }
}
function updateBulkPreview(){
  const items=getBulkItems();
  const val=parseFloat(document.getElementById('bulk-val').value)||0;
  const prices=items.map(p=>p.pesin_fiyat||0).filter(x=>x>0);
  document.getElementById('bs-count').textContent=items.length;
  document.getElementById('bs-avg').textContent=prices.length?'$'+(prices.reduce((a,b)=>a+b,0)/prices.length).toFixed(2):'—';
  document.getElementById('bs-min').textContent=prices.length?'$'+Math.min(...prices).toFixed(2):'—';
  document.getElementById('bs-max').textContent=prices.length?'$'+Math.max(...prices).toFixed(2):'—';
  document.getElementById('bulk-prev-count').textContent=items.length+' ürün';
  document.getElementById('bulk-apply-btn').disabled=!val||!items.length;
  if(!items.length){document.getElementById('bulk-prev-list').innerHTML='<div class="hist-empty">Fiyatlı ürün bulunamadı</div>';return;}
  if(!val){document.getElementById('bulk-prev-list').innerHTML='<div class="hist-empty">Değer girin</div>';return;}
  const rows=items.slice(0,20).map(p=>{
    const nv=calcNew(p.pesin_fiyat,val);
    const diff=nv-p.pesin_fiyat;
    const cls=diff>0?'up':diff<0?'dn':'';
    return '<div class="bulk-prev-row"><span class="bulk-prev-name">'+esc(p.urun_kodu||'—')+'</span><span class="bulk-prev-old">$'+p.pesin_fiyat.toFixed(2)+'</span><span class="bulk-prev-arrow">→</span><span class="bulk-prev-new '+cls+'">$'+nv.toFixed(2)+'</span></div>';
  }).join('');
  document.getElementById('bulk-prev-list').innerHTML=rows+(items.length>20?'<div class="hist-empty">…+'+(items.length-20)+' ürün daha</div>':'');
}
async function applyBulk(){
  const items=getBulkItems();
  const val=parseFloat(document.getElementById('bulk-val').value)||0;
  if(!val||!items.length)return;
  const btn=document.getElementById('bulk-apply-btn');
  btn.disabled=true;btn.textContent='Uygulanıyor...';dot('busy');
  let ok=0,err=0;
  for(const p of items){
    const nv=parseFloat(calcNew(p.pesin_fiyat,val).toFixed(2));
    if(nv===p.pesin_fiyat)continue;
    // Geçmişe yaz
    await pushHistory(p.id,p.urun_kodu,p.pesin_fiyat,nv);
    const{error}=await db.from('fiyatlar').update({pesin_fiyat:nv,vadeli_fiyat:nv>0?nv+.10:0,updated_at:new Date().toISOString()}).eq('id',p.id);
    if(error)err++;else{p.pesin_fiyat=nv;p.vadeli_fiyat=nv>0?nv+.10:0;p.updated_at=new Date().toISOString();ok++;}
  }
  btn.disabled=false;btn.textContent='✓ Uygula';
  dot(err?'err':'ok');
  if(ok)toast(ok+' ürün güncellendi'+(err?' ('+err+' hata)':''),'ok');
  else toast('Değişiklik yok','wrn');
  closeBulkDw();
  render();
}

// ============================================================
// ANA VERİ
// ============================================================
async function sync(){
  dot('busy');
  const{data,error}=await db.from('fiyatlar').select('*').order('id',{ascending:true});
  if(error){dot('err');document.getElementById('list').innerHTML='<div class="empty-s"><div class="ei">⚠️</div><h3>Bağlantı hatası</h3><p>'+esc(error.message)+'</p></div>';return;}
  const raw=data||[];let proc=[];
  const hdrs=raw.filter(x=>isHdr(x)),items=raw.filter(x=>!isHdr(x));
  hdrs.forEach(h=>{proc.push(h);const nxt=hdrs.find(nh=>nh.id>h.id);const si=items.filter(it=>it.bolum_adi===h.urun_kodu||(!it.bolum_adi&&it.id>h.id&&(!nxt||it.id<nxt.id)));si.forEach(it=>it.bolum_adi=h.urun_kodu);proc.push(...si);});
  P=proc;dot('ok');
  if(allCl)P.forEach(p=>{if(isHdr(p))closed.add(p.urun_kodu);});
  const rs=new Set(P.filter(p=>isHdr(p)).map(p=>p.urun_kodu));[...closed].forEach(r=>{if(!rs.has(r))closed.delete(r);});
  updBolumSel();render();
}
function updBolumSel(){const s=document.getElementById('p-bolum');s.innerHTML='<option value="">Bölüm seçin</option>'+P.filter(x=>isHdr(x)).map(x=>'<option value="'+esc(x.urun_kodu)+'">'+esc(x.urun_kodu)+'</option>').join('');}
function onSearch(){document.getElementById('qc').classList.toggle('on',document.getElementById('q').value.length>0);render();}
function clearQ(){document.getElementById('q').value='';document.getElementById('qc').classList.remove('on');render();}
function toggleAll(){allCl=!allCl;const lbl=allCl?'↕ Genişlet':'↕ Daralt';document.getElementById('col-btn').textContent=lbl;document.getElementById('col-btn2').textContent=allCl?'↗':'↕';if(allCl)P.forEach(p=>{if(isHdr(p))closed.add(p.urun_kodu);});else closed.clear();render();}
function render(){
  const area=document.getElementById('list'),term=trl(document.getElementById('q').value.trim());
  const G={};let cur=null;
  P.forEach(p=>{if(isHdr(p)){cur=p.urun_kodu;if(!G[cur])G[cur]={hdr:p,items:[]};}else if(cur){G[cur].items.push(p);}});
  const cats=Object.keys(G);
  if(!cats.length){area.innerHTML='<div class="empty-s"><div class="ei">💰</div><h3>Henüz bölüm yok</h3><p>"Ekle" ile başlayın.</p></div>';document.getElementById('s-total').textContent='0';return;}
  let h='',yc=0,mc=0;
  cats.forEach((cn,ci)=>{
    const g=G[cn],cl=closed.has(cn),ce=esc(cn),hid=esc(String(g.hdr.id));
    let fi=g.items;
    if(term){fi=fi.filter(p=>trl(p.urun_kodu).includes(term)||trl(p.denye).includes(term));if(!fi.length&&!trl(cn).includes(term))return;}
    yc+=fi.length;mc+=fi.filter(p=>!p.pesin_fiyat).length;
    const delay=(ci*0.04).toFixed(2);
    h+='<div class="cat '+(cl?'closed':'')+'" data-cat="'+ce+'" style="animation-delay:'+delay+'s">'
      +'<div class="cat-head" data-act="toggle" data-cat="'+ce+'">'
      +'<div class="cat-left"><span class="cat-chev">▼</span><span class="cat-name">📂 '+ce+'</span><span class="cat-badge">'+fi.length+'</span></div>'
      +'<div class="cat-actions">'
      +'<button class="cb ppl" data-act="bulk-cat" data-cat="'+ce+'" title="Toplu güncelle">📊</button>'
      +'<button class="cb acc" data-act="add-to" data-cat="'+ce+'" title="Ürün ekle">➕</button>'
      +'<button class="cb acc" data-act="edit-cat" data-id="'+hid+'" title="Düzenle">✏️</button>'
      +'<button class="cb dng" data-act="del-cat" data-id="'+hid+'" data-cat="'+ce+'" title="Sil">🗑️</button>'
      +'</div></div><div class="cat-body">';
    fi.forEach(p=>{
      const id=esc(String(p.id)),c=p.pesin_fiyat||0,hp=c>0,ec=hp?'':'empty';
      const cd=hp?c.toFixed(2)+' $':'—',p9=hp?(c+.10).toFixed(2)+' $':'—',p18=hp?(c+.20).toFixed(2)+' $':'—';
      const tm=p.updated_at?new Date(p.updated_at).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'';

      const dc=p.denye?'':'empty';
      h+='<div class="item">'
        +'<input type="checkbox" class="item-chk" data-act="chk" data-id="'+id+'" '+(selIds.has(p.id)?'checked':'')+'>'
        +'<div class="item-name">'+esc(p.urun_kodu||'İsimsiz')+'</div>'
        +'<div class="denye-tag '+dc+'">'+esc(p.denye||'—')+'</div>'
        +'<div class="price-val cash '+ec+'" data-act="fast" data-id="'+id+'" data-price="'+c+'">'+cd+(tm?'<span class="ptime">'+tm+'</span>':'')+'</div>'
        +'<div class="price-val v90 '+ec+'">'+p9+'</div>'
        +'<div class="price-val v180 '+ec+'">'+p18+'</div>'
        +'<div class="item-acts">'
        +'<button class="ib hist" data-act="hist" data-id="'+id+'" title="Geçmiş">📈</button>'
        +'<button class="ib" data-act="edit-item" data-id="'+id+'" title="Düzenle">✏️</button>'
        +'<button class="ib dng" data-act="del-item" data-id="'+id+'" title="Sil">🗑️</button>'
        +'</div>'
        +'</div>';
    });
    h+='</div></div>';
  });
  area.innerHTML=h||'<div class="empty-s"><div class="ei">🔍</div><h3>Sonuç yok</h3><p>"'+esc(term)+'" bulunamadı.</p></div>';
  document.getElementById('s-total').textContent=yc;
  const sw=document.getElementById('s-sel-wrap');sw.style.display=selIds.size>0?'flex':'none';document.getElementById('s-sel').textContent=selIds.size;
  const mw=document.getElementById('s-miss-wrap');mw.style.display=mc>0?'flex':'none';document.getElementById('s-miss').textContent=mc;
}

const LA=document.getElementById('list');
LA.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;
  const a=t.dataset.act,id=t.dataset.id,cat=t.dataset.cat;
  if(t.closest('.cat-actions'))e.stopPropagation();
  switch(a){
    case'toggle':if(cat){closed.has(cat)?closed.delete(cat):closed.add(cat);render();}break;
    case'add-to':if(cat)openDwForCat(cat);break;
    case'edit-cat':if(id)editEntry(id);break;
    case'del-cat':if(id&&cat)askDelCat(id,cat);break;
    case'edit-item':if(id)editEntry(id);break;
    case'del-item':if(id)askDelItem(id);break;
    case'fast':if(t.dataset.price!==undefined)fastEdit(t,id,parseFloat(t.dataset.price)||0);break;
    case'hist':if(id)openHistory(id);break;
    case'bulk-cat':if(cat)openBulkForCat(cat);break;
  }
});
LA.addEventListener('change',e=>{const t=e.target.closest('[data-act="chk"]');if(!t)return;const id=parseInt(t.dataset.id);t.checked?selIds.add(id):selIds.delete(id);const sw=document.getElementById('s-sel-wrap');sw.style.display=selIds.size>0?'flex':'none';document.getElementById('s-sel').textContent=selIds.size;});

function openBulkForCat(cat){
  openBulkDw();
  setTimeout(()=>{document.getElementById('bulk-bolum').value=cat;updateBulkPreview();},50);
}

async function fastEdit(el,id,cur){
  if(el.querySelector('input'))return;
  const orig=el.innerHTML;
  el.innerHTML='<input type="number" step="0.01" class="fast-in" value="'+(cur||'')+'" placeholder="0.00" min="0">';
  const inp=el.querySelector('input');inp.focus();inp.select();
  const save=async()=>{
    const nv=parseFloat(inp.value)||0;
    if(nv===cur){el.innerHTML=orig;return;}
    el.innerHTML=nv.toFixed(2)+' $<span class="ptime">...</span>';
    el.dataset.price=nv;dot('busy');
    const it=P.find(x=>String(x.id)===String(id));
    const oldPrice=it?it.pesin_fiyat:cur;
    // Geçmişe yaz
    await pushHistory(id,it?it.urun_kodu:'',oldPrice,nv);
    const{error}=await db.from('fiyatlar').update({pesin_fiyat:nv,vadeli_fiyat:nv>0?nv+.10:0,updated_at:new Date().toISOString()}).eq('id',id);
    if(error){dot('err');toast('Hata','bad');el.innerHTML=orig;return;}
    if(it){it.pesin_fiyat=nv;it.vadeli_fiyat=nv>0?nv+.10:0;it.updated_at=new Date().toISOString();}
    dot('ok');toast('Fiyat güncellendi','ok');render();
  };
  inp.addEventListener('blur',save);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){el.innerHTML=orig;}});
}

function resetDw(){document.getElementById('eid').value='';document.getElementById('dw-mode').value='item';['p-code','p-denye','p-cash'].forEach(x=>document.getElementById(x).value='');document.getElementById('p-bolum').value='';document.getElementById('a90').textContent='0.00 $';document.getElementById('a180').textContent='0.00 $';document.querySelectorAll('.field').forEach(f=>f.classList.remove('bad'));}
function calcAuto(){const c=parseFloat(document.getElementById('p-cash').value)||0;document.getElementById('a90').textContent=(c+.10).toFixed(2)+' $';document.getElementById('a180').textContent=(c+.20).toFixed(2)+' $';}
function openDw(){document.getElementById('ov').classList.add('on');document.getElementById('dw').classList.add('on');setTimeout(()=>document.getElementById('p-code').focus(),250);}
function openDwNew(){resetDw();document.getElementById('dw-t').textContent='💰 Yeni Kayıt';document.getElementById('sv-btn').textContent='Kaydet';document.getElementById('item-fields').style.display='block';document.getElementById('fg-bolum').style.display='block';document.getElementById('code-lbl').textContent='Ürün Adı';document.getElementById('dw-mode').value='item';openDw();}
function openDwForCat(cn){resetDw();document.getElementById('dw-t').textContent='➕ '+cn;document.getElementById('sv-btn').textContent='Kaydet';document.getElementById('item-fields').style.display='block';document.getElementById('fg-bolum').style.display='none';document.getElementById('p-bolum').value=cn;document.getElementById('dw-mode').value='item';openDw();}
function editEntry(id){
  const it=P.find(x=>String(x.id)===String(id));if(!it)return;
  resetDw();document.getElementById('eid').value=it.id;
  if(isHdr(it)){document.getElementById('dw-t').textContent='✏️ Bölüm Düzenle';document.getElementById('dw-mode').value='category';document.getElementById('item-fields').style.display='none';document.getElementById('fg-bolum').style.display='none';document.getElementById('code-lbl').textContent='Bölüm Adı';document.getElementById('p-code').value=it.urun_kodu||'';}
  else{document.getElementById('dw-t').textContent='✏️ Ürün Düzenle';document.getElementById('dw-mode').value='item';document.getElementById('item-fields').style.display='block';document.getElementById('fg-bolum').style.display='block';document.getElementById('code-lbl').textContent='Ürün Adı';document.getElementById('p-code').value=it.urun_kodu||'';document.getElementById('p-denye').value=it.denye||'';document.getElementById('p-cash').value=it.pesin_fiyat||'';document.getElementById('p-bolum').value=it.bolum_adi||'';calcAuto();}
  document.getElementById('sv-btn').textContent='Güncelle';openDw();
}
function closeDw(){document.getElementById('ov').classList.remove('on');document.getElementById('dw').classList.remove('on');}

async function saveEntry(){
  document.querySelectorAll('.field').forEach(f=>f.classList.remove('bad'));
  const id=document.getElementById('eid').value;
  const mode=document.getElementById('dw-mode').value;
  const code=document.getElementById('p-code').value.trim();
  if(!code){document.getElementById('p-code').closest('.field').classList.add('bad');return;}
  const btn=document.getElementById('sv-btn');btn.disabled=true;btn.textContent='Kaydediliyor...';dot('busy');
  let error;
  if(mode==='category'||(!id&&!document.getElementById('p-bolum').value&&!document.getElementById('p-denye').value&&!document.getElementById('p-cash').value)){
    if(id){const old=P.find(x=>String(x.id)===String(id));const on=old?old.urun_kodu:'';({error}=await db.from('fiyatlar').update({urun_kodu:code.toUpperCase()}).eq('id',id));if(!error&&on)await db.from('fiyatlar').update({bolum_adi:code.toUpperCase()}).eq('bolum_adi',on);}
    else{({error}=await db.from('fiyatlar').insert([{urun_kodu:code.toUpperCase()}]));}
  }else{
    const c=parseFloat(document.getElementById('p-cash').value)||0;
    const pay={urun_kodu:code.toUpperCase(),denye:document.getElementById('p-denye').value.trim()||null,pesin_fiyat:c,vadeli_fiyat:c>0?c+.10:0,bolum_adi:document.getElementById('p-bolum').value||null,updated_at:new Date().toISOString()};
    if(id){
      const old=P.find(x=>String(x.id)===String(id));
      if(old&&old.pesin_fiyat!==c)await pushHistory(id,code,old.pesin_fiyat,c);
      ({error}=await db.from('fiyatlar').update(pay).eq('id',id));
    }else{({error}=await db.from('fiyatlar').insert([pay]));}
  }
  btn.disabled=false;btn.textContent=id?'Güncelle':'Kaydet';
  if(error){dot('err');toast('Hata: '+error.message,'bad');return;}
  dot('ok');toast(id?'Güncellendi':'Eklendi','ok');closeDw();sync();
}

function askDelItem(id){const it=P.find(x=>String(x.id)===String(id));if(!it)return;confirm2('Ürün Sil','"'+(it.urun_kodu||'İsimsiz')+'" silinsin mi?',async()=>{dot('busy');const{error}=await db.from('fiyatlar').delete().eq('id',id);if(error){dot('err');toast('Hata','bad');return;}selIds.delete(parseInt(id));dot('ok');toast('Silindi','ok');sync();});}
function askDelCat(hid,cn){const cnt=P.filter(x=>x.bolum_adi===cn).length;confirm2('"'+cn+'" Sil','Bölüm ve '+cnt+' ürün silinecek!',async()=>{dot('busy');await db.from('fiyatlar').delete().eq('bolum_adi',cn);await db.from('fiyatlar').delete().eq('id',hid);closed.delete(cn);dot('ok');toast(cn+' silindi','ok');sync();});}
function confirm2(t,b,cb){document.getElementById('cf-t').textContent=t;document.getElementById('cf-b').textContent=b;cfCb=cb;document.getElementById('mod-cf').classList.add('on');}
function closeMod(){document.getElementById('mod-cf').classList.remove('on');cfCb=null;}
document.getElementById('cf-ok').addEventListener('click',()=>{const c=cfCb;closeMod();if(c)c();});
document.querySelectorAll('.modal').forEach(m=>m.addEventListener('click',e=>{if(e.target===m){m.classList.remove('on');if(histChart&&!document.getElementById('mod-hist').classList.contains('on')){histChart.destroy();histChart=null;}}}));

async function exportXL(wp){const dt=new Date().toLocaleDateString('tr-TR');let d=selIds.size>0?P.filter(p=>selIds.has(p.id)):P.filter(p=>!isHdr(p));if(!d.length){toast('Veri yok','wrn');return;}try{const wb=new ExcelJS.Workbook();wb.creator='Yanteks Pro';const sh=wb.addWorksheet('Yanteks',{pageSetup:{paperSize:9,orientation:'landscape'}});const cc=wp?5:2;sh.mergeCells(1,1,1,cc);const tc=sh.getCell('A1');tc.value=(wp?'YANTEKS FİYAT LİSTESİ':'YANTEKS ÜRÜN LİSTESİ')+' ('+dt+')';tc.font={bold:true,size:14,color:{argb:'FFFFFFFF'}};tc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0B0F1A'}};tc.alignment={horizontal:'center',vertical:'middle'};sh.getRow(1).height=30;const hs=wp?['ÜRÜN ADI','DENYE','PEŞİN ($)','90 GÜN ($)','180 GÜN ($)']:['ÜRÜN ADI','DENYE'];const hr=sh.addRow(hs);hr.eachCell(c=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A2035'}};c.font={color:{argb:'FFFFFFFF'},bold:true};c.alignment={horizontal:'center',vertical:'middle'};});hr.height=24;sh.columns=wp?[{width:35},{width:15},{width:15},{width:15},{width:15}]:[{width:35},{width:15}];let cb='';d.forEach(p=>{if(p.bolum_adi&&p.bolum_adi!==cb){cb=p.bolum_adi;const r=sh.addRow(['📂 '+cb]);sh.mergeCells(r.number,1,r.number,cc);r.getCell(1).fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF141926'}};r.getCell(1).font={bold:true,color:{argb:'FF818CF8'},size:11};r.height=22;}const c=p.pesin_fiyat||0;const ra=wp?[p.urun_kodu||'',p.denye||'-',c.toFixed(2).replace('.',',')+' $',(c+.10).toFixed(2).replace('.',',')+' $',(c+.20).toFixed(2).replace('.',',')+' $']:[p.urun_kodu||'',p.denye||'-'];const row=sh.addRow(ra);row.getCell(1).font={bold:true};row.getCell(2).alignment={horizontal:'center'};if(wp){row.getCell(3).font={color:{argb:'FF34D399'},bold:true};row.getCell(3).alignment={horizontal:'right'};row.getCell(4).font={color:{argb:'FFA78BFA'},bold:true};row.getCell(4).alignment={horizontal:'right'};row.getCell(5).font={color:{argb:'FF818CF8'},bold:true};row.getCell(5).alignment={horizontal:'right'};}});const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Yanteks_'+(wp?'Fiyat':'Urun')+'_'+dt.replace(/\./g,'-')+'.xlsx';a.click();URL.revokeObjectURL(a.href);toast('Excel indirildi','ok');}catch(e){toast('Excel hatası','bad');console.error(e);}}
async function exportMissing(){const miss=P.filter(p=>!isHdr(p)&&!p.pesin_fiyat);if(!miss.length){toast('Eksik fiyat yok 👍','ok');return;}try{const dt=new Date().toLocaleDateString('tr-TR');const wb=new ExcelJS.Workbook();const sh=wb.addWorksheet('Eksik');sh.mergeCells('A1:D1');const tc=sh.getCell('A1');tc.value='EKSİK FİYATLAR ('+dt+')';tc.font={bold:true,size:14,color:{argb:'FFFFFFFF'}};tc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFD97706'}};tc.alignment={horizontal:'center',vertical:'middle'};sh.getRow(1).height=30;sh.columns=[{width:35},{width:15},{width:20},{width:25}];const hr=sh.addRow(['ÜRÜN ADI','DENYE','BÖLÜM','DURUM']);hr.eachCell(c=>{c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A2035'}};c.font={color:{argb:'FFFFFFFF'},bold:true};c.alignment={horizontal:'center'};});miss.forEach(p=>{const r=sh.addRow([p.urun_kodu||'',p.denye||'-',p.bolum_adi||'-','Fiyat Eksik']);r.getCell(4).font={color:{argb:'FFF87171'},bold:true};});const b=await wb.xlsx.writeBuffer();const blob=new Blob([b],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='Eksik_Fiyatlar_'+dt.replace(/\./g,'-')+'.xlsx';a.click();URL.revokeObjectURL(a.href);toast(miss.length+' eksik dışa aktarıldı','wrn');}catch(e){toast('Excel hatası','bad');}}

document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();openDwNew();}if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('q').focus();}if(e.key==='Escape'){closeDw();closeBulkDw();closeMod();}});

document.querySelector('.toolbar').insertAdjacentHTML('afterbegin','<button class="chip ppl" onclick="openBulkDw()">📊 Toplu Güncelle</button>');

sync();
